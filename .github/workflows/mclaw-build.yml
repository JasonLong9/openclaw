name: Mclaw-Build-Mac-ARM64-Final

on:
  workflow_dispatch: 

jobs:
  build_mac:
    runs-on: macos-14 # 确保是真实的 M 系列芯片环境

    steps:
      - name: 1. 拉取 v2026.3.24 代码
        uses: actions/checkout@v4
        with:
          ref: 'v2026.3.24' 

      - name: 2. 环境准备
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. 安装依赖与编译
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install
          npm run build || echo "跳过 build"

      - name: 4. 组装标准 darwin-arm64 结构
        run: |
          # 创建符合规范的根目录
          mkdir -p darwin-arm64/bin
          
          # 1. 尝试寻找并放置入口文件 (根据 OpenClaw 规范)
          # 如果存在根目录 bin，则复制；否则尝试从 packages 提取
          cp -r bin/* darwin-arm64/bin/ 2>/dev/null || cp packages/core/bin/* darwin-arm64/bin/ 2>/dev/null || touch darwin-arm64/bin/openclaw
          
          # 2. 复制 node_modules
          cp -R node_modules darwin-arm64/
          
          # 3. 满足特殊的 node_modules/openclaw/package.json 要求
          # 如果是 monorepo，创建一个符号链接或拷贝
          mkdir -p darwin-arm64/node_modules/openclaw
          cp package.json darwin-arm64/node_modules/openclaw/

          # 4. 生成 darwin-arm64-runtime-notes.txt
          echo "Mclaw Build Notes" > darwin-arm64/darwin-arm64-runtime-notes.txt
          echo "------------------" >> darwin-arm64/darwin-arm64-runtime-notes.txt
          echo "Build Date: $(date)" >> darwin-arm64/darwin-arm64-runtime-notes.txt
          echo "Architecture: $(uname -m)" >> darwin-arm64/darwin-arm64-runtime-notes.txt
          echo "Source Tag: v2026.3.24" >> darwin-arm64/darwin-arm64-runtime-notes.txt
          echo "Version Output:" >> darwin-arm64/darwin-arm64-runtime-notes.txt
          node -e "console.log(require('./package.json').version)" >> darwin-arm64/darwin-arm64-runtime-notes.txt

      - name: 5. 最终打包
        run: |
          # 保持目录名为 darwin-arm64 进行压缩
          tar -czvf openclaw-darwin-arm64.tar.gz darwin-arm64/

      - name: 6. 上传符合入仓标准的 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-official-runtime
          path: openclaw-darwin-arm64.tar.gz
