name: Mclaw-Build-Mac-ARM64-Final

on:
  workflow_dispatch: 

jobs:
  build_mac:
    runs-on: macos-14 

    steps:
      - name: 1. 拉取 v2026.3.24 代码
        uses: actions/checkout@v4
        with:
          ref: 'v2026.3.24' 

      - name: 2. 准备 Node 环境 (升级到 24 适配 2026 环境)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 3. 安装依赖 (忽略 PeerDeps 报错)
        run: |
          npm config set registry https://registry.npmmirror.com
          # 使用 --force 强行安装，防止因为旧版本依赖冲突卡死
          npm install --force || echo "安装过程有警告，继续执行"

      - name: 4. 执行编译
        run: |
          npm run build || echo "没有 build 脚本或编译失败，跳过"

      - name: 5. 调试：查看当前目录到底有什么 (防空跑)
        run: |
          ls -R

      - name: 6. 组装标准 darwin-arm64 结构
        run: |
          mkdir -p darwin-arm64/bin
          
          # 寻找二进制入口：先找根目录，再找 packages 内部
          find . -name "openclaw" -type f -exec cp {} darwin-arm64/bin/ \; || touch darwin-arm64/bin/openclaw
          
          # 复制 node_modules (如果太大可以只复制关键部分，但这里全复制以保万全)
          cp -R node_modules darwin-arm64/ 2>/dev/null || mkdir -p darwin-arm64/node_modules
          
          # 补齐 node_modules/openclaw/package.json
          mkdir -p darwin-arm64/node_modules/openclaw
          cp package.json darwin-arm64/node_modules/openclaw/

          # 生成 notes.txt
          echo "Mclaw Build Notes" > darwin-arm64/darwin-arm64-runtime-notes.txt
          echo "------------------" >> darwin-arm64/darwin-arm64-runtime-notes.txt
          echo "Build Date: $(date)" >> darwin-arm64/darwin-arm64-runtime-notes.txt
          echo "Architecture: $(uname -m)" >> darwin-arm64/darwin-arm64-runtime-notes.txt
          echo "Source Tag: v2026.3.24" >> darwin-arm64/darwin-arm64-runtime-notes.txt

      - name: 7. 最终打包
        run: |
          tar -czvf openclaw-darwin-arm64.tar.gz darwin-arm64/

      - name: 8. 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-official-runtime
          path: openclaw-darwin-arm64.tar.gz
