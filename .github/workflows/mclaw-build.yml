name: Mclaw-Build-Mac-ARM64

on:
  workflow_dispatch: 

jobs:
  build_mac:
    runs-on: macos-14 

    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4
        with:
          ref: 'v2026.3.24' 

      - name: 2. 准备 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. 安装依赖 (允许报错并继续)
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install --legacy-peer-deps || npm install

      - name: 4. 尝试编译 (如果不存在则跳过)
        run: |
          npm run build || echo "没有找到 build 命令，跳过"

      - name: 5. 暴力打包 (不管有没有编译都全打包)
        run: |
          mkdir -p mclaw_runtime
          # 尝试复制所有可能用到的目录
          cp -R bin mclaw_runtime/ 2>/dev/null || true
          cp -R dist mclaw_runtime/ 2>/dev/null || true
          cp -R node_modules mclaw_runtime/ 2>/dev/null || true
          cp -R packages mclaw_runtime/ 2>/dev/null || true
          cp package.json mclaw_runtime/ 2>/dev/null || true
          tar -czvf mclaw-darwin-arm64-v3.24.tar.gz mclaw_runtime/

      - name: 6. 上传战利品
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-mac-arm64-runtime
          path: mclaw-darwin-arm64-v3.24.tar.gz
