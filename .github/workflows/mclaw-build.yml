name: Mclaw-Build-Mac-ARM64

on:
  workflow_dispatch: 

jobs:
  build_mac:
    runs-on: macos-14 

    steps:
      - name: 1. 定位到 3.24 版本代码
        uses: actions/checkout@v4
        with:
          ref: 'v2026.3.24' 

      - name: 2. 准备 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # ★ 删掉了 cache: 'npm' 这一行，不再报错找锁文件了

      - name: 3. 切换镜像源 (提速并防超时)
        run: npm config set registry https://registry.npmmirror.com

      - name: 4. 安装依赖
        run: npm install

      - name: 5. 执行编译
        # 如果报错找不到 build 命令，请查看代码里 package.json 的 scripts 部分
        run: npm run build || echo "跳过编译步骤"

      - name: 6. 整理并打包
        run: |
          mkdir -p mclaw_runtime
          # 使用 cp -R 确保递归复制文件夹
          cp -R bin mclaw_runtime/ || true
          cp -R dist mclaw_runtime/ || true
          cp -R node_modules mclaw_runtime/ || true
          cp package.json mclaw_runtime/ || true
          tar -czvf mclaw-darwin-arm64-v3.24.tar.gz mclaw_runtime/

      - name: 7. 上传战利品
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-mac-arm64-runtime
          path: mclaw-darwin-arm64-v3.24.tar.gz
