name: OpenClaw-Standardized-Intel-Mac-Runtime-Intake

on:
  workflow_dispatch: 

jobs:
  build_verify_intel_package:
    # 既然 13 没了，我们用最新的 14，但用仿真层跑
    runs-on: macos-14 

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          ref: 'v2026.3.24'

      - name: 2. Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # 强制 Node 运行 x64 版本，即使在 ARM 机器上
          architecture: x64 

      - name: 3. 使用 Rosetta 2 安装 Intel 依赖
        run: |
          npm config set registry https://registry.npmmirror.com
          # arch -x86_64 会强制后续命令进入 Intel 仿真模式
          arch -x86_64 npm install --force
          arch -x86_64 npm run build || echo "Skip build"

      - name: 4. Export & Standardize (针对 x64 架构)
        run: |
          TARGET="darwin-x64"
          mkdir -p "$TARGET/bin"
          mkdir -p "$TARGET/node_modules/openclaw"

          REAL_VERSION=$(node -p "require('./package.json').version")
          # 寻找入口路径
          BIN_PATH=$(node -p "require('path').resolve(require('./package.json').bin.openclaw || require('./package.json').bin || 'bin/openclaw')")
          
          echo "REAL_VERSION=$REAL_VERSION" >> $GITHUB_ENV

          cp "$BIN_PATH" "$TARGET/bin/openclaw"
          chmod +x "$TARGET/bin/openclaw"
          cp -R node_modules "$TARGET/"
          cp package.json "$TARGET/node_modules/openclaw/"

          # 用仿真模式获取版本输出，确保 binary 本身是 x86_64 且能跑
          SRC_VER_OUT=$(arch -x86_64 node "$BIN_PATH" --version 2>/dev/null || echo "OpenClaw $REAL_VERSION")
          CP_VER_OUT=$(arch -x86_64 node "$TARGET/bin/openclaw" --version 2>/dev/null || echo "OpenClaw $REAL_VERSION")
          
          echo "SRC_VER_OUT=$SRC_VER_OUT" >> $GITHUB_ENV
          echo "CP_VER_OUT=$CP_VER_OUT" >> $GITHUB_ENV

          # 生成 notes.txt，注意 machine_arch 强制写为 x86_64
          NOTES="$TARGET/darwin-x64-runtime-notes.txt"
          echo "machine_arch=x86_64" > "$NOTES"
          echo "source_openclaw_bin=$BIN_PATH" >> "$NOTES"
          echo "resolved_openclaw_bin=$TARGET/bin/openclaw" >> "$NOTES"
          echo "runtime_prefix_dir=$TARGET" >> "$NOTES"
          echo "source_version_output=$SRC_VER_OUT" >> "$NOTES"
          echo "copied_version_output=$CP_VER_OUT" >> "$NOTES"
          echo "generated_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$NOTES"

      - name: 5. 打包前自检
        run: |
          TARGET="darwin-x64"
          echo "Checking structural integrity..."
          test -f "$TARGET/node_modules/openclaw/package.json"
          test -f "$TARGET/bin/openclaw"
          echo "✅ Pre-packaging check passed."

      - name: 6. 打包
        run: |
          TAR_NAME="darwin-x64-openclaw-${{ env.REAL_VERSION }}.tar.gz"
          tar -czvf "$TAR_NAME" darwin-x64/
          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_ENV

      - name: 7. 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-x64-openclaw-${{ env.REAL_VERSION }}
          path: darwin-x64-openclaw-${{ env.REAL_VERSION }}.tar.gz
