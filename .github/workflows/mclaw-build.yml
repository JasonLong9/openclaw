name: Mclaw-Build-Mac-ARM64

on:
  workflow_dispatch: # 允许手动点按钮触发

jobs:
  build_mac:
    # 必须用 macos-14 才是 Apple Silicon (M1/M2) 芯片，产出 arm64 包
    runs-on: macos-14 

    steps:
      - name: 1. 定位到 3.24 版本代码
        uses: actions/checkout@v4
        with:
          # 核心：虽然脚本在 main，但这里强制拉取 v2026.3.24 的代码
          ref: 'v2026.3.24' 

      - name: 2. 准备 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. 架构确认 (防止打错成 x86)
        run: uname -m

      - name: 4. 安装依赖
        # GitHub 服务器在海外，不需要切镜像源，直接装
        run: npm install

      - name: 5. 执行编译
        run: npm run build

      - name: 6. 整理并打包“最小必需件”
        run: |
          # 创建一个干净的目录存放你要的东西
          mkdir -p mclaw_runtime
          # 复制清单里的东西
          cp -r bin mclaw_runtime/ || true
          cp -r dist mclaw_runtime/ || true
          cp -r node_modules mclaw_runtime/ || true
          cp package.json mclaw_runtime/
          # 压缩成一个文件
          tar -czvf mclaw-darwin-arm64-v3.24.tar.gz mclaw_runtime/

      - name: 7. 上传战利品
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-mac-arm64-runtime
          path: mclaw-darwin-arm64-v3.24.tar.gz
